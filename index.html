<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StringTune - Guitar Tuner</title>
    <link rel="stylesheet" href="./style.css">
    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
</head>
<body>
    <div id="app">

        <div class="top-nav">
            <button class="nav-btn active">E-Standard <img src="./images/note.png" alt="note"> </button>
            <button class="nav-btn">Chord Book <img src="./images/chordbook.png" alt="chordbook"></button>
        </div>

        <div class="tuner-nav">
            <div class="note-display-wrapper">
                <div class="note-row">
                    <div class="accidental" id="flatIcon">♭</div>
                    <div id="noteDisplay">E</div>
                    <div class="accidental" id="sharpIcon">#</div>
                </div>
                
                <div id="frequencyDisplay">-- HZ</div>
            </div>

            <div class="meter-wrapper">
                <canvas id="meterCanvas"></canvas>
            </div>
        </div>

        <div class="guitar-section">
            <div class="strings-col left-strings">
                <button class="string-btn" data-note="D3">D</button>
                <button class="string-btn" data-note="A2">A</button>
                <button class="string-btn" data-note="E2">E</button> 
            </div>

            <div class="guitar-head-wrapper">
                <img src="./images/guitarhead.png" alt="Guitar Head">
            </div>

            <div class="strings-col right-strings">
                <button class="string-btn" data-note="G3">G</button>
                <button class="string-btn" data-note="B3">B</button>
                <button class="string-btn" data-note="E4">E</button>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
